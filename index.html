<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SCBoard Ops</title>
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <div id="app" class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">SCBoard Ops</p>
          <h1>Cloud sync dashboard</h1>
        </div>
        <div class="topbar__actions">
          <span id="freshness" class="freshness">No data</span>
          <button id="refreshButton" class="button button--primary" type="button">Refresh</button>
        </div>
      </header>

      <main>
        <section id="alert" class="alert" hidden></section>

        <section class="workspace">
          <aside class="sidebar" aria-label="Dashboard settings">
            <form id="settingsForm" class="settings">
              <label>
                API endpoint
                <input id="endpointInput" name="endpoint" type="url" placeholder="https://.../api/dashboard" autocomplete="off">
              </label>
              <label>
                Access token
                <input id="tokenInput" name="token" type="password" placeholder="Required by API" autocomplete="current-password">
              </label>
              <label>
                Rows
                <input id="limitInput" name="limit" type="number" min="1" max="100" value="20">
              </label>
              <label>
                Auto refresh
                <select id="refreshIntervalInput" name="refreshInterval">
                  <option value="0" selected>Off</option>
                  <option value="30">30s</option>
                  <option value="60">60s</option>
                  <option value="300">5m</option>
                </select>
              </label>
              <button class="button" type="submit">Apply</button>
              <button id="testApiButton" class="button" type="button">Test API</button>
            </form>
          </aside>

          <section class="content" aria-live="polite">
            <section class="summary">
              <div class="summary__main">
                <p class="section-label">Current state</p>
                <h2 id="headlineStatus">Waiting for data</h2>
                <p id="headlineMeta" class="muted">Connect a dashboard API to load live data.</p>
              </div>
              <dl id="metricStrip" class="metric-strip"></dl>
            </section>

            <section id="collectionSections" class="collections"></section>

            <section class="panel debug-panel">
              <div class="panel__header panel__header--compact">
                <div>
                  <p class="section-label">Debug</p>
                  <h3>Request log</h3>
                </div>
                <div class="debug-actions">
                  <button id="copyLogButton" class="button" type="button">Copy</button>
                  <button id="clearLogButton" class="button" type="button">Clear</button>
                </div>
              </div>
              <pre id="debugLog" class="debug-log"></pre>
            </section>

          </section>
        </section>
      </main>
    </div>

    <script src="assets/app.js"></script>
  </body>
</html>
